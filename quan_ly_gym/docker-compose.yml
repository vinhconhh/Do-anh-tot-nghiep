services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qlgym_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - qlgym_network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: qlgym_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./database:/docker-entrypoint-initdb.d
    environment:
      - DB_SERVER=db
      - DB_PORT=1433
      - DB_NAME=${DB_NAME}
      - DB_USER=sa
      - DB_PASSWORD=${MSSQL_SA_PASSWORD}
      - DB_DRIVER=ODBC Driver 18 for SQL Server
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - qlgym_network

  frontend:
    build: ./frontend
    container_name: qlgym_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    networks:
      - qlgym_network

networks:
  qlgym_network:
    driver: bridge

volumes:
  mssql_data: