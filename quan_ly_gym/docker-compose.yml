version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qlgym_db
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - qlgym_network

  backend:
    build: ./backend
    container_name: qlgym_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./database:/docker-entrypoint-initdb.d
    environment:
      - DB_SERVER=db
      - DB_NAME=${DB_NAME}
      - DB_USER=sa
      - DB_PASSWORD=${MSSQL_SA_PASSWORD}
      - DB_DRIVER=ODBC Driver 18 for SQL Server
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    depends_on:
      - db
    networks:
      - qlgym_network

  frontend:
    build: ./frontend
    container_name: qlgym_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - qlgym_network

networks:
  qlgym_network:
    driver: bridge

volumes:
  sqlserver_data: