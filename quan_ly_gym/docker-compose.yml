services:
  backend:
    build: ./backend
    container_name: qlgym_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./database:/docker-entrypoint-initdb.d
      - ../AI_local:/app/AI_local
    environment:
      - DB_SERVER=host.docker.internal
      - DB_PORT=1433
      - DB_NAME=${DB_NAME}
      - DB_USER=sa
      - DB_PASSWORD=${MSSQL_SA_PASSWORD}
      - DB_DRIVER=ODBC Driver 18 for SQL Server
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qlgym_network

  frontend:
    build: ./frontend
    container_name: qlgym_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    networks:
      - qlgym_network

networks:
  qlgym_network:
    driver: bridge